name: Build and Push Docker Images

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "44 3 * * *"

env:
  REGISTRY: ghcr.io
  COSIGN_VERSION: v2.4.1

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has-images: ${{ steps.discover.outputs.has-images }}

    steps:
      - uses: actions/checkout@v4

      - name: Discover images
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          echo "� Discovering images in images/ directory..."

          if [[ ! -d images ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has-images=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t valid_images < <(
            for d in images/*/; do
              [[ -d "$d" ]] || continue
              name="$(basename "$d")"
              [[ -f "$d/Dockerfile" ]] || { echo "⚠️ skip $name: no Dockerfile"; continue; }
              [[ -f "$d/tag" ]] || { echo "⚠️ skip $name: no tag file"; continue; }
              echo "$name"
            done
          )

          if [[ ${#valid_images[@]} -eq 0 ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has-images=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No valid images found."
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${valid_images[@]}" | jq -R . | jq -s -c .)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "has-images=true" >> "$GITHUB_OUTPUT"
          echo "� Total images: ${#valid_images[@]}"

  build:
    needs: discover
    if: needs.discover.outputs.has-images == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        image: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare vars
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          image_lc="$(echo "$image" | tr '[:upper:]' '[:lower:]')"
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          tag_raw="$(tr -d '[:space:]' < "images/$image/tag")"
          tag="$(echo "$tag_raw" | tr '[:upper:]' '[:lower:]')"

          [[ -f "images/$image/Dockerfile" ]] || { echo "Dockerfile missing"; exit 1; }
          [[ -n "$tag" ]] || { echo "tag is empty"; exit 1; }
          [[ "$tag" =~ ^[a-z0-9._-]+$ ]] || { echo "invalid tag: $tag"; exit 1; }

          full_image="${{ env.REGISTRY }}/${owner_lc}/${image_lc}"
          full_ref="${full_image}:${tag}"

          echo "image=$image_lc" >> "$GITHUB_OUTPUT"
          echo "owner=$owner_lc" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "full_image=$full_image" >> "$GITHUB_OUTPUT"
          echo "full_ref=$full_ref" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tag exists
        id: exists
        shell: bash
        run: |
          set -euo pipefail
          if docker manifest inspect "${{ steps.prep.outputs.full_ref }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Exists: ${{ steps.prep.outputs.full_ref }}"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "� Not found: ${{ steps.prep.outputs.full_ref }}"
          fi

      - name: Extract Docker metadata
        if: steps.exists.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.full_image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        if: steps.exists.outputs.skip != 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./images/${{ matrix.image }}
          file: ./images/${{ matrix.image }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ steps.prep.outputs.image }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.image }}

      - name: Install cosign (pinned)
        if: steps.exists.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fL "https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/cosign-linux-amd64" -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Sign image
        if: steps.exists.outputs.skip != 'true'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$TAGS" | xargs -I {} cosign sign --yes "{}@${DIGEST}"

      - name: Per-image summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Build Summary: ${{ steps.prep.outputs.image }}"
            echo
            if [[ "${{ steps.exists.outputs.skip }}" == "true" ]]; then
              echo "⏭️ **Skipped** (already exists)"
              echo "- Ref: \`${{ steps.prep.outputs.full_ref }}\`"
            elif [[ "${{ steps.build.outcome }}" == "success" ]]; then
              echo "✅ **Built & pushed**"
              echo "- Ref: \`${{ steps.prep.outputs.full_ref }}\`"
              echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            else
              echo "❌ **Build failed**"
              echo "- Image: \`${{ steps.prep.outputs.image }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs: [discover, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Workflow summary
        run: |
          echo "## Workflow Complete �" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Discover has-images: \`${{ needs.discover.outputs.has-images }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build job result: \`${{ needs.build.result }}\`" >> "$GITHUB_STEP_SUMMARY"
